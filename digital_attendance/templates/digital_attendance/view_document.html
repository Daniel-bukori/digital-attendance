<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hakiki Nyaraka - Digital Attendance</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .back-btn { display: inline-block; padding: 12px 25px; background-color: #007bff; color: white; text-decoration: none; font-weight: bold; border-radius: 4px; margin-bottom: 20px; transition: background 0.3s; }
        .back-btn:hover { background-color: #0056b3; }
        h2 { color: #333; margin-bottom: 20px; }
        .preview-box { width: 100%; height: 600px; border: 2px solid #ddd; border-radius: 4px; background: #fafafa; }
        .download-fallback { margin-top: 15px; display: block; color: #dc3545; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <a href="{% url 'dashboard' %}" class="back-btn">⬅ Rudi Dashboard (Back)</a>
        
        <h2>Inahakiki: {{ file_name }}</h2>
        
        <iframe class="preview-box" src="{{ file_url }}" type="application/pdf"></iframe>

        <a href="{{ file_url }}" target="_blank" class="download-fallback">
            ⚠️ Faili halionekani? Bofya hapa kulifungua moja kwa moja kwenye Tab Mpya
        </a>
    </div>

</body>
</html>
